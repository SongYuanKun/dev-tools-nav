<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="index,follow,max-image-preview:large" />
  <meta name="description" content="Windows / Office / Server KMS 激活工具，一键命令搞定。" />
  <title>KMS 激活 · Koen的工具箱</title>
  <link rel="icon" href="../../assets/logo.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="../../css/style.css" />
  <link rel="stylesheet" href="../../css/tools.css" />
  <script defer src="../../js/base.js"></script>
</head>
<body>
  <header>
    <nav class="navbar" role="navigation" aria-label="主导航"></nav>
  </header>

  <main class="tool-shell">
    <a class="tool-shell-back" href="../">返回在线工具</a>
    <div class="tool-shell-head">
      <div>
        <div id="toolTitle" class="tool-shell-title">加载中...</div>
        <div id="toolDesc" class="tool-shell-desc"></div>
        <div id="toolTags" class="tool-shell-meta"></div>
      </div>
      <div class="tool-shell-actions">
        <button id="favBtn" type="button" class="tool-btn">收藏</button>
        <a id="legacyLink" class="tool-btn" href="#" target="_blank" rel="noopener noreferrer">在新标签页打开</a>
      </div>
    </div>
    <div id="toolError" class="tools-empty" style="display:none;">加载失败，可尝试在新标签页打开。</div>
    <iframe id="toolFrame" class="tool-shell-iframe" title="KMS 激活"></iframe>
  </main>

  <footer class="footer">
    <div class="footer-content">
      <div class="footer-brand">
        <img src="../../assets/logo.svg" alt="K" class="footer-logo" />
        <span class="footer-brand-name">Koen's 工具箱</span>
      </div>
      <div class="footer-links">
        <a href="../../index.html">首页</a>
        <span class="footer-divider">|</span>
        <a href="https://github.com/SongYuanKun" target="_blank" rel="noopener noreferrer">GitHub</a>
      </div>
      <p class="footer-copyright">Made with code by Koen · 数据来源于公开信息整理</p>
    </div>
  </footer>

  <script src="../../data/tools.js"></script>
  <script src="../../js/theme-mini.js"></script>
  <script src="../../js/tools-prefs.js"></script>
  <script src="../../js/tools-shell.js"></script>
  <script defer src="../../js/footer.js"></script>
</body>
</html>
