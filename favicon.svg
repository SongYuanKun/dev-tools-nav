<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  <!-- 背景圆角矩形 -->
  <rect x="5" y="5" width="90" height="90" rx="20" fill="url(#logoGrad)"/>
  <!-- K 字母 -->
  <text x="50" y="72" font-family="Arial, sans-serif" font-size="60" font-weight="bold" fill="white" text-anchor="middle">K</text>
  <!-- 小装饰点 - 代表工具/代码 -->
  <circle cx="75" cy="25" r="8" fill="white" opacity="0.9"/>
  <circle cx="85" cy="40" r="5" fill="white" opacity="0.7"/>
</svg>