name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

# GitHub 将默认用 Node 24 跑 JS Action；显式开启可避免 Node 20 弃用告警
# 参见 https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Build blog posts from Markdown
        run: node scripts/build-blog.mjs

      - name: Generate dynamic sitemap
        run: node scripts/generate-sitemap.mjs

      - name: Generate AI topic changelog
        run: node scripts/generate-ai-changelog.mjs

      - name: Refresh CSDN articles from RSS
        env:
          CSDN_RSS_URL: https://blog.csdn.net/syk123839070/rss/list
        run: python3 scripts/sync-csdn-rss.py

      - name: Assemble site
        run: |
          mkdir -p _site
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='README.md' \
            --exclude='.gitignore' \
            --exclude='docs' \
            --exclude='content' \
            --exclude='package.json' \
            --exclude='package-lock.json' \
            --exclude='deploy.sh' \
            --exclude='logs' \
            --exclude='*.bak' \
            --exclude='.DS_Store' \
            ./ _site/

      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
