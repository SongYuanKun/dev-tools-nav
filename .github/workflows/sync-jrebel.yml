name: Sync JRebel License Server

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch and update servers.json
        run: python3 scripts/sync-jrebel-server.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet data/servers.json; then
            echo "No changes to data/servers.json, skip commit."
          else
            git add data/servers.json
            git commit -m "chore: 自动同步 JRebel 激活地址"
            git push origin HEAD
          fi
