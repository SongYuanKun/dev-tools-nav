name: Update assets screenshots

on:
  workflow_dispatch:
  schedule:
    # 每周一 00:15 UTC（北京时间约周一 08:15）
    - cron: "15 0 * * 1"

permissions:
  contents: write

concurrency:
  group: update-screenshots
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Capture screenshots
        run: |
          python3 -m http.server 8765 --directory . &
          SERVER_PID=$!
          sleep 2
          BASE_URL=http://127.0.0.1:8765 node scripts/capture-screenshots.mjs
          kill $SERVER_PID

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/screenshot.png assets/screenshot-blog.png assets/screenshot-json-tool.png
          if git diff --staged --quiet; then
            echo "No screenshot changes."
          else
            git commit -m "chore(assets): refresh screenshots"
            git push
          fi
