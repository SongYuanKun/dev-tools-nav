name: Sync open source radar

on:
  schedule:
    # 每周一 10:00（北京时间）更新雷达
    - cron: "0 2 * * 1"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Sync AI open source radar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/sync-open-source-radar.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/open-source-radar.json
          if git diff --cached --quiet; then
            echo "No changes to open-source-radar.json, skip commit."
          else
            git commit -m "chore: 同步 AI 开源项目雷达周报"
            git push origin HEAD
          fi
