name: Sync CSDN articles

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Fetch RSS and update JSON
        env:
          CSDN_RSS_URL: https://blog.csdn.net/syk123839070/rss/list
        run: python3 scripts/sync-csdn-rss.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/csdn-articles.json
          if git diff --cached --quiet; then
            echo "No changes to data/csdn-articles.json, skip commit."
          else
            git commit -m "chore: 同步 CSDN 最新文章列表"
            git push origin HEAD
          fi
