      background: var(--bg-category); color: var(--text-secondary); font-size: 13px; font-weight: 500;

    .blog-cat-btn:hover { border-color: var(--color-primary); color: var(--color-primary); background: var(--color-primary-light); }
    .blog-cat-btn.active { background: var(--color-primary); border-color: var(--color-primary); color: white; }
    .blog-list { display: flex; flex-direction: column; gap: 16px; }
    .blog-card {
      display: flex; flex-direction: column; gap: 10px; padding: 24px; background: var(--bg-card);
      border: 1px solid var(--border-card); border-radius: var(--radius-lg); box-shadow: var(--shadow-card);
      text-decoration: none; transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }
    .blog-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-card-hover); border-color: var(--color-primary); }
    .blog-card-meta {
      display: flex; align-items: center; gap: 12px; font-size: 12px; color: var(--text-muted); flex-wrap: wrap;
    }
    .blog-card-category {
      padding: 2px 10px; background: var(--color-primary-light); color: var(--color-primary);

    .blog-card-title { font-size: 18px; font-weight: 700; color: var(--text-primary); line-height: 1.4; }
    .blog-card-desc { font-size: 14px; color: var(--text-secondary); line-height: 1.7; }
    .blog-card-tags { display: flex; flex-wrap: wrap; gap: 6px; }
    .blog-card-external {
      display: inline-flex; align-items: center; gap: 4px; font-size: 11px;
      color: var(--text-muted); background: var(--bg-tag); padding: 2px 8px;
      border-radius: var(--radius-full);
    }
    .blog-empty {
      text-align: center; padding: 60px 24px; color: var(--text-muted); font-size: 15px;
    }
    .blog-subscribe {
      margin-top: 40px; padding: 28px; background: var(--bg-card); border: 1px solid var(--border-card);
      border-radius: var(--radius-lg); text-align: center; box-shadow: var(--shadow-card);

  <script>
    (function () {
      var currentCat = "all";

      function escapeHtml(str) {
        var d = document.createElement("div");
        d.appendChild(document.createTextNode(str));
        return d.innerHTML;
      }

      function initTheme() {
        var saved = localStorage.getItem("dev-tools-theme");
        var theme = saved || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
        document.documentElement.setAttribute("data-theme", theme);
        var btn = document.getElementById("themeToggle");
        if (btn) {
          btn.textContent = theme === "dark" ? "☀️" : "🌙";
          btn.title = theme === "dark" ? "切换到亮色模式" : "切换到暗色模式";
          btn.addEventListener("click", function () {
            var cur = document.documentElement.getAttribute("data-theme");
            var next = cur === "dark" ? "light" : "dark";
            localStorage.setItem("dev-tools-theme", next);
            document.documentElement.setAttribute("data-theme", next);
            btn.textContent = next === "dark" ? "☀️" : "🌙";
            btn.title = next === "dark" ? "切换到亮色模式" : "切换到暗色模式";
          });
        }
      }

      function initCategories() {
        var container = document.getElementById("blogCategories");
        if (!container || typeof BLOG_CATEGORIES === "undefined") return;
        BLOG_CATEGORIES.forEach(function (cat) {
          var btn = document.createElement("button");
          btn.className = "blog-cat-btn" + (cat.id === "all" ? " active" : "");
          btn.textContent = cat.label;
          btn.addEventListener("click", function () {
            currentCat = cat.id;
            container.querySelectorAll(".blog-cat-btn").forEach(function (b) { b.classList.remove("active"); });
            btn.classList.add("active");
            renderPosts();
          });
          container.appendChild(btn);
        });
      }

      function renderPosts() {
        var list = document.getElementById("blogList");
        var empty = document.getElementById("blogEmpty");
        if (!list) return;

        var posts = typeof BLOG_POSTS !== "undefined" ? BLOG_POSTS : [];
        var filtered = posts.filter(function (p) {
          if (p.status !== "published") return false;
          if (currentCat === "all") return true;
          return p.category === currentCat;
        });

        if (filtered.length === 0) {
          list.innerHTML = "";
          if (empty) empty.style.display = "";
          return;
        }
        if (empty) empty.style.display = "none";

        list.innerHTML = filtered.map(function (p) {
          var href = p.externalUrl || p.url;
          var target = p.externalUrl ? ' target="_blank" rel="noopener noreferrer"' : "";
          var externalBadge = p.externalUrl ? '<span class="blog-card-external">↗ CSDN</span>' : "";
          var tags = (p.tags || []).map(function (t) {
            return '<span class="tag">' + escapeHtml(t) + "</span>";
          }).join("");
          return '<a href="' + escapeHtml(href) + '" class="blog-card"' + target + ">" +
            '<div class="blog-card-meta">' +
              '<span class="blog-card-category">' + escapeHtml(p.category) + "</span>" +
              "<span>" + escapeHtml(p.date) + "</span>" +
              "<span>" + p.readTime + " 分钟阅读</span>" +
              externalBadge +
            "</div>" +
            '<h2 class="blog-card-title">' + escapeHtml(p.title) + "</h2>" +
            '<p class="blog-card-desc">' + escapeHtml(p.description) + "</p>" +
            '<div class="blog-card-tags">' + tags + "</div>" +
          "</a>";
        }).join("");
      }

      document.addEventListener("DOMContentLoaded", function () {
        initTheme();
        initCategories();
        renderPosts();
      });
    })();
  </script>
