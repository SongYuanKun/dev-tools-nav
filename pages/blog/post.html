<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文章加载中...</title>
  <style>
    /* ===== CSS 变量（与全站保持一致） ===== */
    :root {
      --text-primary: #1a1a2e;
      --text-secondary: #6b7280;
      --bg-page: #ffffff;
      --bg-surface: #f9fafb;
      --border-color: #e5e7eb;
      --color-primary: #3b82f6;
      --color-primary-hover: #2563eb;
      --radius-md: 8px;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
      --font-mono: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
    }

    /* 暗色模式 */
    @media (prefers-color-scheme: dark) {
      :root {
        --text-primary: #f1f5f9;
        --text-secondary: #94a3b8;
        --bg-page: #0f172a;
        --bg-surface: #1e293b;
        --border-color: #334155;
        --color-primary: #60a5fa;
        --color-primary-hover: #93c5fd;
        --shadow-sm: 0 1px 3px rgba(0,0,0,0.4);
      }
    }

    /* ===== 全局重置 ===== */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background-color: var(--bg-page);
      color: var(--text-primary);
      line-height: 1.6;
      min-height: 100vh;
    }

    a {
      color: var(--color-primary);
      text-decoration: none;
      transition: color 0.2s;
    }
    a:hover {
      color: var(--color-primary-hover);
      text-decoration: underline;
    }

    /* ===== 导航栏 ===== */
    .navbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg-page);
      border-bottom: 1px solid var(--border-color);
      padding: 0 2rem;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      backdrop-filter: blur(8px);
    }

    .navbar__brand {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text-primary);
      text-decoration: none;
    }

    .navbar__brand img {
      width: 32px;
      height: 32px;
    }

    .navbar__links {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      list-style: none;
    }

    .navbar__links a {
      color: var(--text-secondary);
      font-size: 0.9rem;
      font-weight: 500;
      transition: color 0.2s;
    }
    .navbar__links a:hover,
    .navbar__links a.active {
      color: var(--color-primary);
      text-decoration: none;
    }

    /* ===== 文章主体 ===== */
    .post-container {
      max-width: 740px;
      margin: 0 auto;
      padding: 3rem 1.5rem 4rem;
    }

    /* 文章头部 */
    .post-header {
      margin-bottom: 2.5rem;
      padding-bottom: 2rem;
      border-bottom: 1px solid var(--border-color);
    }

    .post-header__category {
      display: inline-block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--color-primary);
      background: rgba(59, 130, 246, 0.1);
      padding: 0.25rem 0.75rem;
      border-radius: 20px;
      margin-bottom: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .post-header__title {
      font-size: 2.25rem;
      font-weight: 800;
      line-height: 1.3;
      margin-bottom: 1rem;
      color: var(--text-primary);
    }

    .post-header__meta {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 1rem;
      font-size: 0.875rem;
      color: var(--text-secondary);
    }

    .post-header__meta span {
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    .post-header__tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 1rem;
    }

    .post-header__tags span {
      font-size: 0.75rem;
      background: var(--bg-surface);
      border: 1px solid var(--border-color);
      padding: 0.2rem 0.6rem;
      border-radius: var(--radius-md);
      color: var(--text-secondary);
    }

    /* 文章正文排版 */
    .post-content {
      line-height: 1.8;
      font-size: 1.05rem;
      color: var(--text-primary);
    }

    .post-content h2 {
      font-size: 1.5rem;
      font-weight: 700;
      margin: 2.5rem 0 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border-color);
    }

    .post-content h3 {
      font-size: 1.25rem;
      font-weight: 600;
      margin: 2rem 0 0.75rem;
    }

    .post-content p {
      margin-bottom: 1.25rem;
    }

    .post-content ul,
    .post-content ol {
      margin-bottom: 1.25rem;
      padding-left: 1.5rem;
    }

    .post-content li {
      margin-bottom: 0.5rem;
    }

    .post-content strong {
      font-weight: 600;
      color: var(--text-primary);
    }

    .post-content code {
      font-family: var(--font-mono);
      font-size: 0.875em;
      background: var(--bg-surface);
      border: 1px solid var(--border-color);
      padding: 0.15rem 0.4rem;
      border-radius: 4px;
      color: var(--color-primary);
    }

    .post-content pre {
      margin-bottom: 1.5rem;
      border-radius: var(--radius-md);
      overflow-x: auto;
      background: #1e293b;
      border: 1px solid #334155;
    }

    .post-content pre code {
      display: block;
      padding: 1.25rem 1.5rem;
      font-size: 0.85rem;
      line-height: 1.7;
      color: #e2e8f0;
      background: transparent;
      border: none;
      border-radius: 0;
    }

    /* ===== 文章底部导航 ===== */
    .post-nav {
      margin-top: 3rem;
      padding-top: 2rem;
      border-top: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: stretch;
      gap: 1rem;
    }

    .post-nav__item {
      flex: 1;
      padding: 1rem 1.25rem;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      transition: border-color 0.2s, box-shadow 0.2s;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .post-nav__item:hover {
      border-color: var(--color-primary);
      box-shadow: var(--shadow-sm);
      text-decoration: none;
    }

    .post-nav__item--prev {
      text-align: left;
    }
    .post-nav__item--next {
      text-align: right;
    }

    .post-nav__label {
      font-size: 0.75rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .post-nav__title {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text-primary);
    }

    .post-nav__back {
      display: block;
      text-align: center;
      margin-top: 1.5rem;
      padding: 0.75rem 1.5rem;
      background: var(--bg-surface);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text-secondary);
      transition: all 0.2s;
    }
    .post-nav__back:hover {
      color: var(--color-primary);
      border-color: var(--color-primary);
      text-decoration: none;
    }

    /* ===== 错误/空状态 ===== */
    .post-error {
      text-align: center;
      padding: 4rem 1rem;
    }
    .post-error__icon {
      font-size: 3rem;
      margin-bottom: 1rem;
    }
    .post-error__title {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }
    .post-error__desc {
      color: var(--text-secondary);
      margin-bottom: 1.5rem;
    }

    /* ===== 响应式 ===== */
    @media (max-width: 768px) {
      .navbar {
        padding: 0 1rem;
      }
      .navbar__links {
        gap: 1rem;
        font-size: 0.8rem;
      }
      .post-container {
        padding: 2rem 1rem 3rem;
      }
      .post-header__title {
        font-size: 1.75rem;
      }
      .post-content {
        font-size: 1rem;
      }
      .post-nav {
        flex-direction: column;
      }
      .post-nav__item--next {
        text-align: left;
      }
    }

    @media (max-width: 480px) {
      .navbar__links {
        gap: 0.75rem;
      }
      .post-header__title {
        font-size: 1.5rem;
      }
      .post-header__meta {
        flex-direction: column;
        align-items: flex-start;
        gap: 0.5rem;
      }
    }
  </style>
  <script defer src="../../js/base.js"></script>
</head>
<body>

  <!-- ===== 导航栏 ===== -->
  <nav class="navbar">
    <a href="../../index.html" class="navbar__brand">
      <img src="../../assets/logo.svg" alt="K">
      <span>Koen's 工具箱</span>
    </a>
    <ul class="navbar__links">
      <li><a href="../../index.html">首页</a></li>
      <li><a href="../ai/index.html">🤖 AI 专题</a></li>
      <li><a href="../tools/index.html">在线工具</a></li>
      <li><a href="index.html" class="active">技术博客</a></li>
      <li><a href="../tools/index.html">在线工具</a></li>
      <li><a href="../ai/index.html">AI 专题</a></li>
    </ul>
  </nav>

  <!-- ===== 文章容器 ===== -->
  <main class="post-container" id="post-container">
    <!-- 由 JavaScript 动态渲染 -->
  </main>

  <!-- ===== 加载文章数据 ===== -->
  <script src="../../data/blog-posts.js"></script>
  <script>
    (function() {
      'use strict';

      // 获取 URL 参数中的 slug
      function getSlugFromURL() {
        var params = new URLSearchParams(window.location.search);
        return params.get('slug') || '';
      }

      // 根据 slug 查找文章
      function findPostBySlug(slug) {
        if (!window.BLOG_POSTS_DATA || !Array.isArray(BLOG_POSTS_DATA)) return null;
        for (var i = 0; i < BLOG_POSTS_DATA.length; i++) {
          if (BLOG_POSTS_DATA[i].slug === slug) {
            return { post: BLOG_POSTS_DATA[i], index: i };
          }
        }
        return null;
      }

      // 获取上一篇/下一篇
      function getAdjacentPosts(index) {
        var prev = index > 0 ? BLOG_POSTS_DATA[index - 1] : null;
        var next = index < BLOG_POSTS_DATA.length - 1 ? BLOG_POSTS_DATA[index + 1] : null;
        return { prev: prev, next: next };
      }

      // 渲染文章
      function renderPost(post, index) {
        // 更新页面标题
        document.title = post.title + ' · Koen的工具箱';

        // 构建标签 HTML
        var tagsHTML = '';
        if (post.tags && post.tags.length) {
          tagsHTML = '<div class="post-header__tags">';
          for (var i = 0; i < post.tags.length; i++) {
            tagsHTML += '<span>' + post.tags[i] + '</span>';
          }
          tagsHTML += '</div>';
        }

        // 构建文章头部
        var headerHTML = ''
          + '<header class="post-header">'
          + '  <span class="post-header__category">' + escapeHTML(post.category) + '</span>'
          + '  <h1 class="post-header__title">' + escapeHTML(post.title) + '</h1>'
          + '  <div class="post-header__meta">'
          + '    <span>📅 ' + escapeHTML(post.date) + '</span>'
          + '    <span>✍️ ' + escapeHTML(post.author) + '</span>'
          + '    <span>⏱️ ' + escapeHTML(post.readTime) + '</span>'
          + '  </div>'
          + tagsHTML
          + '</header>';

        // 构建正文
        var contentHTML = '<article class="post-content">' + post.content + '</article>';

        // 构建底部导航
        var adjacent = getAdjacentPosts(index);
        var navHTML = '<nav class="post-nav">';

        if (adjacent.prev) {
          navHTML += '<a class="post-nav__item post-nav__item--prev" href="post.html?slug=' + encodeURIComponent(adjacent.prev.slug) + '">'
            + '<span class="post-nav__label">← 上一篇</span>'
            + '<span class="post-nav__title">' + escapeHTML(adjacent.prev.title) + '</span>'
            + '</a>';
        } else {
          navHTML += '<div class="post-nav__item post-nav__item--prev" style="visibility:hidden;"></div>';
        }

        if (adjacent.next) {
          navHTML += '<a class="post-nav__item post-nav__item--next" href="post.html?slug=' + encodeURIComponent(adjacent.next.slug) + '">'
            + '<span class="post-nav__label">下一篇 →</span>'
            + '<span class="post-nav__title">' + escapeHTML(adjacent.next.title) + '</span>'
            + '</a>';
        } else {
          navHTML += '<div class="post-nav__item post-nav__item--next" style="visibility:hidden;"></div>';
        }

        navHTML += '</nav>';

        // 返回列表按钮
        var backHTML = '<a class="post-nav__back" href="index.html">← 返回文章列表</a>';

        // 组装并渲染
        document.getElementById('post-container').innerHTML = headerHTML + contentHTML + navHTML + backHTML;
      }

      // 渲染 404 状态
      function renderNotFound(slug) {
        document.title = '文章未找到 · Koen的工具箱';
        document.getElementById('post-container').innerHTML = ''
          + '<div class="post-error">'
          + '  <div class="post-error__icon">📄</div>'
          + '  <h2 class="post-error__title">文章未找到</h2>'
          + '  <p class="post-error__desc">抱歉，未找到标识为 "' + escapeHTML(slug) + '" 的文章。</p>'
          + '  <a href="index.html" class="post-nav__back">← 返回文章列表</a>'
          + '</div>';
      }

      // HTML 转义（防 XSS）
      function escapeHTML(str) {
        if (!str) return '';
        return str
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#039;');
      }

      // ===== 主逻辑 =====
      var slug = getSlugFromURL();

      if (!slug) {
        renderNotFound('');
        return;
      }

      var result = findPostBySlug(slug);

      if (!result) {
        renderNotFound(slug);
        return;
      }

      renderPost(result.post, result.index);

    })();
  </script>
</body>
</html>
