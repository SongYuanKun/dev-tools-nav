<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex,nofollow" />
  <link rel="canonical" href="https://tools.songyuankun.top/tools/json/" />
  <title>JSON 工作台已迁移</title>
  <script>
    (function () {
      var params = new URLSearchParams(location.search);
      var legacyData = params.get("q");
      params.delete("embed");
      params.delete("q");
      var query = params.toString();
      var fragment = legacyData ? "#data=" + encodeURIComponent(legacyData) : "";
      location.replace("../../tools/json/" + (query ? "?" + query : "") + fragment);
    })();
  </script>
</head>
<body>
  <p>JSON 工作台已迁移。若浏览器没有自动跳转，请<a href="../../tools/json/">打开新版 JSON 工作台</a>。</p>
</body>
</html>
