    <header class="tool-page-header">
      <h1>在线颜色转换</h1>
      <p>在 HEX、RGB、HSL、HWB 之间实时互转，预览颜色效果，检测 WCAG 对比度并生成 CSS 自定义属性。全部在浏览器本地完成。</p>
    </header>

    <section class="tool-panel" aria-labelledby="color-preview-heading">
      <h2 id="color-preview-heading" class="tool-panel-title">颜色预览</h2>
      <div id="colorPreview" class="color-preview" role="img" aria-label="当前颜色预览"></div>
      <label class="tool-label" for="colorPicker">取色器</label>
      <input type="color" id="colorPicker" class="tool-input" value="#6366f1" />
    </section>

    <section class="tool-panel" aria-labelledby="color-formats-heading">
      <h2 id="color-formats-heading" class="tool-panel-title">格式互转</h2>
      <div class="color-input-row">
        <div>
          <label class="tool-label" for="hexInput">HEX</label>
          <input id="hexInput" class="tool-input" value="#6366f1" autocomplete="off" spellcheck="false" />
        </div>
        <div>
          <label class="tool-label" for="rgbInput">RGB</label>
          <input id="rgbInput" class="tool-input" placeholder="rgb(99, 102, 241)" autocomplete="off" spellcheck="false" />
        </div>
        <div>
          <label class="tool-label" for="hslInput">HSL</label>
          <input id="hslInput" class="tool-input" placeholder="hsl(239, 84%, 67%)" autocomplete="off" spellcheck="false" />
        </div>
        <div>
          <label class="tool-label" for="hwbInput">HWB</label>
          <input id="hwbInput" class="tool-input" placeholder="hwb(239 39% 5%)" autocomplete="off" spellcheck="false" />
        </div>
      </div>
    </section>

    <section class="tool-panel" aria-labelledby="contrast-heading">
      <h2 id="contrast-heading" class="tool-panel-title">对比度检测</h2>
      <div class="timestamp-grid">
        <div>
          <label class="tool-label" for="fgColor">前景色（文字）</label>
          <input type="color" id="fgColor" class="tool-input" value="#ffffff" />
        </div>
        <div>
          <label class="tool-label" for="bgColor">背景色</label>
          <input type="color" id="bgColor" class="tool-input" value="#6366f1" />
        </div>
      </div>
      <div id="contrastResult" class="tool-result">调整前景色与背景色以检测 WCAG 对比度。</div>
    </section>

    <section class="tool-panel" aria-labelledby="css-var-heading">
      <h2 id="css-var-heading" class="tool-panel-title">CSS 变量</h2>
      <label class="tool-label" for="cssVarName">变量名</label>
      <input id="cssVarName" class="tool-input" value="--brand-color" autocomplete="off" spellcheck="false" />
      <div class="tool-actions">
        <button type="button" class="tool-btn tool-btn-primary" id="btnCopyCssVar">复制 CSS 变量</button>
      </div>
