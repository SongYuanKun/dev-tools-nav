<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>工具详情 · Koen的工具箱</title>
  <link rel="icon" href="../assets/logo.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="../css/style.css" />
  <script defer src="../js/base.js"></script>
</head>
<body>

  <!-- ========== 顶部导航 ========== -->
  <header>
    <nav class="navbar" role="navigation" aria-label="主导航">
      <div class="navbar-inner">
        <a href="../index.html" class="logo" aria-label="Koen的工具箱 首页">
          <img src="../assets/logo.svg" alt="K" class="logo-img" />
          <span class="logo-text">Koen<span>'s</span> 工具箱</span>
        </a>
        <div class="nav-links">
          <a href="../index.html" class="nav-link">工具导航</a>
          <a href="about.html" class="nav-link">关于我</a>
        </div>
        <button
          id="themeToggle"
          class="theme-toggle"
          aria-label="切换暗色模式"
          title="切换暗色模式"
        >🌙</button>
      </div>
    </nav>
  </header>

  <!-- ========== 详情页内容 ========== -->
  <main class="detail-page" id="detailPage">

    <!-- 返回按钮 -->
    <a href="../index.html" class="back-btn" aria-label="返回工具列表">
      ← 返回工具列表
    </a>

    <!-- 工具信息头部（由 JS 填充） -->
    <div id="detailContent">
      <div style="text-align:center; padding: 80px 0; color: var(--text-muted);">
        <div style="font-size:48px; margin-bottom:16px;">⏳</div>
        <p>加载中...</p>
      </div>
    </div>

    <!-- 相关工具（由 JS 填充） -->
    <div id="relatedSection"></div>

  </main>

  <!-- ========== 页脚 ========== -->
  <footer class="footer">
    <div class="footer-content">
      <div class="footer-brand">
        <img src="../assets/logo.svg" alt="K" class="footer-logo" />
        <span class="footer-brand-name">Koen's 工具箱</span>
      </div>
      <div class="footer-links">
        <a href="../index.html">工具导航</a>
        <span class="footer-divider">|</span>
        <a href="about.html">关于我</a>
        <span class="footer-divider">|</span>
        <a href="https://github.com/SongYuanKun" target="_blank" rel="noopener noreferrer">GitHub</a>
      </div>
      <p class="footer-copyright">Made with ❤️ by Koen · 数据来源于公开信息整理</p>
    </div>
  </footer>

  <!-- 数据 & 逻辑 -->
  <script src="../data/tools.js"></script>
  <script src="../data/articles.js"></script>
  <script src="../js/main.js"></script>
  <script>
    // ============================================================
    // 详情页逻辑
    // ============================================================
    (function () {
      function getQueryParam(key) {
        return new URLSearchParams(window.location.search).get(key);
      }

      function getCategoryInfo(categoryId) {
        if (typeof CATEGORIES === "undefined") return { label: categoryId, icon: "🔧" };
        return CATEGORIES.find((c) => c.id === categoryId) || { label: categoryId, icon: "🔧" };
      }

      function escapeHtml(str) {
        const div = document.createElement("div");
        div.appendChild(document.createTextNode(str));
        return div.innerHTML;
      }

      function renderContentSections(tool) {
        const c = tool.content;
        if (!c) return "";

        let html = "";

        if (c.freeQuota) {
          const q = c.freeQuota;
          const modelsHtml = Array.isArray(q.models) ? q.models.join("、") : escapeHtml(q.models || "—");
          html += `
          <div class="detail-section">
            <h2>🆓 免费额度</h2>
            <table style="width:100%; border-collapse:collapse; font-size:14px;">
              <tr style="border-bottom:1px solid var(--border-color);">
                <td style="padding:10px 0; color:var(--text-muted); width:120px;">可用模型</td>
                <td style="padding:10px 0; color:var(--text-primary);">${modelsHtml}</td>
              </tr>
              <tr style="border-bottom:1px solid var(--border-color);">
                <td style="padding:10px 0; color:var(--text-muted);">免费额度</td>
                <td style="padding:10px 0; color:var(--text-primary);">${escapeHtml(q.quota)}</td>
              </tr>
              <tr style="border-bottom:1px solid var(--border-color);">
                <td style="padding:10px 0; color:var(--text-muted);">使用周期</td>
                <td style="padding:10px 0; color:var(--text-primary);">${escapeHtml(q.period)}</td>
              </tr>
              <tr>
                <td style="padding:10px 0; color:var(--text-muted);">刷新周期</td>
                <td style="padding:10px 0; color:var(--text-primary);">${escapeHtml(q.refresh)}</td>
              </tr>
            </table>
          </div>`;
        }

        if (c.features && c.features.length) {
          const items = c.features.map((f) => `<li>${escapeHtml(f)}</li>`).join("");
          html += `
          <div class="detail-section">
            <h2>核心特性</h2>
            <ul class="detail-features-list">${items}</ul>
          </div>`;
        }

        if (c.quickstart && c.quickstart.length) {
          const steps = c.quickstart.map((step, i) => {
            const title = escapeHtml(step.title || "");
            const code = escapeHtml(step.code || "");
            return `
            <div class="detail-step" data-step-index="${i}">
              <h3>${title}</h3>
              <div class="detail-code-wrap">
                <button type="button" class="detail-copy-btn">复制</button>
                <pre><code>${code}</code></pre>
              </div>
            </div>`;
          }).join("");
          html += `
          <div class="detail-section">
            <h2>快速上手</h2>
            <div class="detail-quickstart">${steps}</div>
          </div>`;
        }

        if (c.tips) {
          const tipsText = Array.isArray(c.tips) ? c.tips.map((t) => escapeHtml(t)).join("<br>") : escapeHtml(c.tips);
          html += `
          <div class="detail-section">
            <h2>实用技巧</h2>
            <div class="detail-tips-box">${tipsText}</div>
          </div>`;
        }

        if (c.links && c.links.length) {
          const linksHtml = c.links.map((l) => `<a href="${escapeHtml(l.url)}" target="_blank" rel="noopener noreferrer" class="detail-link-btn">${escapeHtml(l.label)}</a>`).join("");
          html += `
          <div class="detail-section">
            <h2>相关链接</h2>
            <div class="detail-links-wrap">${linksHtml}</div>
          </div>`;
        }

        return html;
      }

      function initCopyButtons(container) {
        if (!container) return;
        container.addEventListener("click", (e) => {
          const btn = e.target.closest(".detail-copy-btn");
          if (!btn) return;
          const wrap = btn.closest(".detail-code-wrap");
          const codeEl = wrap && wrap.querySelector("code");
          const text = codeEl ? codeEl.textContent : "";
          navigator.clipboard.writeText(text).then(() => {
            const orig = btn.textContent;
            btn.textContent = "✓ 已复制";
            btn.classList.add("copied");
            setTimeout(() => {
              btn.textContent = orig;
              btn.classList.remove("copied");
            }, 2000);
          });
        });
      }

      function renderDetail(tool) {
        document.title = `${tool.name} · DevTools Nav`;

        const cat = getCategoryInfo(tool.category);
        const tagsHtml = tool.tags
          .map((t) => `<span class="tag">${t}</span>`)
          .join("");

        document.getElementById("detailContent").innerHTML = `
          <div class="detail-header">
            <div class="detail-icon" id="detailIcon">
              <span style="font-size:36px;">${cat.icon}</span>
            </div>
            <div class="detail-meta">
              <h1 class="detail-name">${tool.name}</h1>
              <p class="detail-desc">${tool.description}</p>
              <div class="detail-tags">${tagsHtml}</div>
              <a
                href="${tool.url}"
                target="_blank"
                rel="noopener noreferrer"
                class="detail-visit-btn"
              >
                访问官网
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
                  <polyline points="15 3 21 3 21 9"/>
                  <line x1="10" y1="14" x2="21" y2="3"/>
                </svg>
              </a>
            </div>
          </div>

          <div class="detail-section">
            <h2>工具简介</h2>
            <p>${tool.description}</p>
          </div>

          <div class="detail-section">
            <h2>基本信息</h2>
            <table style="width:100%; border-collapse:collapse; font-size:14px;">
              <tr style="border-bottom:1px solid var(--border-color);">
                <td style="padding:10px 0; color:var(--text-muted); width:100px;">分类</td>
                <td style="padding:10px 0; color:var(--text-primary);">${cat.icon} ${cat.label}</td>
              </tr>
              <tr style="border-bottom:1px solid var(--border-color);">
                <td style="padding:10px 0; color:var(--text-muted);">官网</td>
                <td style="padding:10px 0;">
                  <a href="${tool.url}" target="_blank" rel="noopener noreferrer"
                     style="color:var(--color-primary); word-break:break-all;">
                    ${tool.url}
                  </a>
                </td>
              </tr>
              <tr>
                <td style="padding:10px 0; color:var(--text-muted);">标签</td>
                <td style="padding:10px 0; color:var(--text-primary);">${tool.tags.join(" · ")}</td>
              </tr>
            </table>
          </div>
          ${renderContentSections(tool)}
        `;

        initCopyButtons(document.getElementById("detailContent"));

        // 异步加载图标
        if (tool.icon) {
          const img = new Image();
          img.onload = () => {
            const iconEl = document.getElementById("detailIcon");
            if (iconEl) {
              iconEl.innerHTML = "";
              iconEl.appendChild(img);
            }
          };
          img.alt = tool.name;
          img.src = tool.icon;
        }
      }

      function renderRelated(tool) {
        if (typeof TOOLS_DATA === "undefined") return;
        const related = TOOLS_DATA
          .filter((t) => t.id !== tool.id && t.category === tool.category)
          .slice(0, 4);

        if (related.length === 0) return;

        const cat = getCategoryInfo(tool.category);
        const cardsHtml = related.map((t) => `
          <a href="template.html?id=${t.id}" class="tool-card" style="text-decoration:none; display:flex; flex-direction:column; gap:10px;">
            <div class="card-header">
              <div class="card-icon">
                <span class="card-icon-fallback">${cat.icon}</span>
              </div>
              <div>
                <div class="card-title">${t.name}</div>
                <div class="card-category-label">${cat.icon} ${cat.label}</div>
              </div>
            </div>
            <p class="card-desc">${t.description}</p>
          </a>
        `).join("");

        document.getElementById("relatedSection").innerHTML = `
          <div class="detail-section">
            <h2>同类工具推荐</h2>
            <div class="tools-grid" style="margin-top:16px;">${cardsHtml}</div>
          </div>
        `;
      }

      function renderNotFound() {
        document.getElementById("detailContent").innerHTML = `
          <div style="text-align:center; padding:80px 0;">
            <div style="font-size:56px; margin-bottom:16px;">😕</div>
            <h2 style="font-size:20px; color:var(--text-primary); margin-bottom:8px;">工具未找到</h2>
            <p style="color:var(--text-secondary); margin-bottom:24px;">该工具不存在或已被移除</p>
            <a href="../index.html" style="color:var(--color-primary);">← 返回工具列表</a>
          </div>
        `;
      }

      document.addEventListener("DOMContentLoaded", () => {
        const id = getQueryParam("id");
        if (!id || typeof TOOLS_DATA === "undefined") {
          renderNotFound();
          return;
        }
        const tool = TOOLS_DATA.find((t) => t.id === id);
        if (!tool) {
          renderNotFound();
          return;
        }
        renderDetail(tool);
        renderRelated(tool);
      });
    })();
  </script>
</body>
</html>
