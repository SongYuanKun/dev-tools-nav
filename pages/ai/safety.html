  <script>
    (function () {
      function escapeHtml(str) {
        const div = document.createElement("div");
        div.appendChild(document.createTextNode(str));
        return div.innerHTML;
      }

      function renderSafety() {
        const el = document.getElementById("safetyContent");
        if (!el || typeof AI_SAFETY_DATA === "undefined") return;
        let html = `<p class="safety-intro">${escapeHtml(AI_SAFETY_DATA.intro)}</p><div class="safety-sections">`;
        AI_SAFETY_DATA.sections.forEach((sec) => {
          html += `<div class="safety-block"><h2 class="safety-block-title">${escapeHtml(sec.title)}</h2><ul class="safety-list">`;
          sec.items.forEach((line) => {
            html += `<li>${escapeHtml(line)}</li>`;
          });
          html += `</ul></div>`;
        });
        html += `</div>`;
        el.innerHTML = html;
      }

      document.addEventListener("DOMContentLoaded", () => {
        renderSafety();
      });
    })();
  </script>
