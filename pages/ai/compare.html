  <script>
    (function () {
      function escapeHtml(str) {
        const div = document.createElement("div");
        div.appendChild(document.createTextNode(str));
        return div.innerHTML;
      }

      function getScoreColor(score) {
        if (score >= 9) return "#10b981";
        if (score >= 8) return "#6366f1";
        if (score >= 7) return "#f59e0b";
        return "#94a3b8";
      }

      function renderQuickNav() {
        const nav = document.getElementById("quickNav");
        if (!nav || typeof AI_COMPARE_DATA === "undefined") return;

        nav.innerHTML = AI_COMPARE_DATA.map((c) =>
          `<a href="#compare-${c.id}" class="ai-quick-nav-btn">${c.icon} ${escapeHtml(c.title)}</a>`
        ).join("");
      }

      function renderCompare() {
        const container = document.getElementById("compareContent");
        if (!container || typeof AI_COMPARE_DATA === "undefined") return;

        let html = "";

        AI_COMPARE_DATA.forEach((compare) => {
          html += `<section class="compare-section" id="compare-${compare.id}">`;
          html += `<h2 class="compare-section-title">${compare.icon} ${escapeHtml(compare.title)}</h2>`;
          html += `<p class="compare-section-desc">${escapeHtml(compare.description)}</p>`;

          compare.dimensions.forEach((dim) => {
            html += `<div class="compare-dimension">`;
            html += `<div class="compare-dimension-header">`;
            html += `<span class="compare-dimension-icon">${dim.icon}</span>`;
            html += `<span class="compare-dimension-name">${escapeHtml(dim.name)}</span>`;
            html += `<span class="compare-dimension-desc">${escapeHtml(dim.description)}</span>`;
            html += `</div>`;

            html += `<div class="compare-scores">`;
            compare.tools.forEach((toolId) => {
              const info = AI_TOOL_INFO[toolId];
              const score = dim.scores[toolId];
              if (!info || score === undefined) return;

              const pct = (score / 10) * 100;
              const color = getScoreColor(score);

              html += `<div class="compare-score-row">`;
              html += `<span class="compare-score-name"><img src="${info.icon}" alt="${escapeHtml(info.name)}" class="tool-favicon" loading="lazy" /> ${escapeHtml(info.name)}</span>`;
              html += `<div class="compare-score-bar-bg"><div class="compare-score-bar-fill" style="width:${pct}%;background:${color}"></div></div>`;
              html += `<span class="compare-score-value" style="color:${color}">${score}</span>`;
              html += `</div>`;
            });
            html += `</div>`;

            html += `<div class="compare-dimension-verdict">${escapeHtml(dim.verdict)}</div>`;
            html += `</div>`;
          });

          // 总结
          html += `<div class="compare-summary">`;
          html += `<div class="compare-summary-label">🎯 结论</div>`;
          html += `<div class="compare-summary-text">${escapeHtml(compare.summary)}</div>`;
          html += `<div class="compare-updated">评分更新于 ${escapeHtml(compare.updatedAt)}</div>`;
          html += `</div>`;

          html += `</section>`;
        });

        container.innerHTML = html;

        // 动画：延迟加载评分条
        requestAnimationFrame(() => {
          document.querySelectorAll(".compare-score-bar-fill").forEach((bar) => {
            const targetWidth = bar.style.width;
            bar.style.width = "0";
            requestAnimationFrame(() => {
              bar.style.width = targetWidth;
            });
          });
        });
      }

      document.addEventListener("DOMContentLoaded", () => {
        renderQuickNav();
        renderCompare();
      });
    })();
  </script>
